name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public/assets public/docs public/downloads public/downloads/engine
          cp index.html manual.html release.html security.html technical.html public/
          cp .nojekyll public/
          cp assets/openclaw-native-preview.png assets/styles.css public/assets/
          cp docs/OpenClaw_Windows_Native_Technical_Spec.md docs/OpenClaw_Windows_Native_User_Manual.md public/docs/
          cp downloads/Build-OpenClawWindowsNativeSetup.ps1 \
             downloads/checksums.sha256 \
             downloads/Install-OpenClawWindowsNative.ps1 \
             downloads/OpenClawWindowsNativeSetup.exe \
             downloads/OpenClaw_Windows_Native_Installer.cmd \
             downloads/package-manifest.json \
             downloads/Uninstall-OpenClawWindowsNative.ps1 \
             downloads/Verify-OpenClawWindowsNative.ps1 \
             public/downloads/
          cp downloads/engine/OpenClawWindowsNative.Engine.psm1 public/downloads/engine/

      - name: Upload static site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
